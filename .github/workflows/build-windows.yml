name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask pandas openpyxl pywebview pillow pyinstaller

      - name: Create Windows icon
        run: python create_icon_win.py

      - name: Build with PyInstaller
        run: pyinstaller rate_sheet_windows.spec --noconfirm

      - name: Zip output folder
        run: Compress-Archive -Path "dist/Rate Sheet Generator" -DestinationPath "RateSheetGenerator-Windows.zip"
        shell: pwsh

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Rate Sheet Generator — Latest"
          body: |
            **Download `RateSheetGenerator-Windows.zip`, extract the folder, and run `Rate Sheet Generator.exe`.**

            Built from commit ${{ github.sha }} on ${{ github.run_id && 'main' || 'branch' }}.

            > **First run only:** If Windows shows a blue "Windows protected your PC" warning, click **More info → Run anyway**.
            > Edge WebView2 Runtime is required (pre-installed on Windows 10/11 — no action needed for most users).
          files: RateSheetGenerator-Windows.zip
          make_latest: true
