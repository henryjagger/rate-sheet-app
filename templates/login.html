<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate Sheet Generator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

<div class="login-page">
  <div class="login-brand">
    <span class="login-brand-bar"></span>
    <span class="login-brand-label">Fixed Income — Institutional Rates</span>
  </div>

  <div class="login-card">
    <h1 class="login-title">Rate Sheet Generator</h1>
    <p class="login-sub">Authorised personnel only. Enter your access credentials to continue.</p>

    <div class="login-divider"></div>

    <form method="POST" action="{{ url_for('login') }}">
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <div class="field">
        <input type="password" name="password" placeholder="Access password"
               class="input" autocomplete="current-password" autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enter</button>
    </form>
  </div>

  <p class="login-footer">
    This tool does not guarantee 100% accuracy. Rates should be independently verified.
    For issues contact <a href="mailto:henryjagger@gmail.com">Henry Jagger</a>.
  </p>
</div>

</body>
</html>
